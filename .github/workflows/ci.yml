name: CI Build Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # 1. 构建
      - name: Build website
        run: npm run build 2>&1 | tee build.log

      # 2. 链接检查
      - name: Check for broken links
        run: |
          if grep -q "Docusaurus found broken links" build.log; then
            echo "⚠️ 发现断链，请检查文档链接"
            grep -A5 "Docusaurus found broken links" build.log || true
          fi
          if grep -q "Docusaurus found broken anchors" build.log; then
            echo "⚠️ 发现无效锚点，请检查文档锚点"
            grep -A5 "Docusaurus found broken anchors" build.log || true
          fi
